<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Conversor de Monedas</h1>

    <label>Ingrese la cantidad en dolares: </label>
    <input type="number" id="dolares" placeholder="Cantidad en dolares"><br><br>

    <button onclick="convertir()">Convertir</button>

    <div id="resultado"></div>

    <script>
        const valorDolar = 4000; // Valor del dolar en pesos colombianos
        function convertir() {
            let dolares = parseFloat(document.getElementById("dolares").value);
            let pesos = dolares * valorDolar;

            document.getElementById("resultado").innerHTML = "Equivale a: " + pesos + " pesos colombianos";
        }
    </script>


</body>
</html>
